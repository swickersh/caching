# Default values for squid.
# This is a YAML-formatted file.
#
# This chart deploys Squid forward caching proxy with SSL-Bump support.
# It also includes optional Nginx reverse proxy with caching capabilities.
#
# Squid is enabled by default. Nginx is disabled by default.
# Use squid.enabled and nginx.enabled to enable/disable individual components.

# Cluster DNS domain. If empty, templates assume "cluster.local".
clusterDomain: ""

# ============================================================================
# Environment configuration
# ============================================================================

# Environment selector (default to release, override with --set environment=dev for development)
environment: release

# Environment-specific settings
envSettings:
  dev:
    squid:
      trust-manager:
        namespaceSelector: {}
      image:
        repository: localhost/konflux-ci/squid
        tag: "latest"
    test:
      image:
        repository: localhost/konflux-ci/squid-test
        tag: "latest"
  prerelease:
    squid:
      trust-manager:
        namespaceSelector: {}
      image:
        repository: quay.io/redhat-user-workloads/konflux-vanguard-tenant/caching/squid
        tag: "latest"
    test:
      image:
        repository: quay.io/redhat-user-workloads/konflux-vanguard-tenant/caching/squid-tester
        tag: "latest"
  release:
    squid:
      trust-manager:
        namespaceSelector:
          matchLabels:
            "konflux-ci.dev/type": "tenant"
      image:
        repository: quay.io/konflux-ci/caching/squid
        tag: "latest"
    test:
      image:
        repository: quay.io/konflux-ci/caching/squid-test
        tag: "latest"

# ============================================================================
# SQUID FORWARD PROXY CONFIGURATION
# ============================================================================

# Enable/disable the Squid forward proxy component
squid:
  enabled: true
  # Name used for all squid resources (services, statefulset, configmap) and labels.
  name: "squid"

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Note: repository and tag are set dynamically by environment helpers in _helpers.tpl

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - "ALL"
  seccompProfile:
    type: RuntimeDefault
  readOnlyRootFilesystem: true
  runAsNonRoot: true

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 3128

# Squid Prometheus Exporter Configuration
# This enables monitoring of Squid metrics via Prometheus
# Note: squid-exporter is now integrated into the main squid image
# Note: squid port is referenced from service.port to avoid duplication
squidExporter:
  # Enable or disable the integrated squid-exporter
  enabled: true
  # Port on which the exporter will serve metrics
  port: 9301
  # Metrics path for Prometheus scraping
  metricsPath: "/metrics"
  # Optional authentication (leave empty if not needed)
  squidLogin: ""
  squidPassword: ""
  # Extract service times (increases metric detail)
  extractServiceTimes: "true"
  # Custom labels to add to metrics
  customLabels: {}
  # Security context for the squid-exporter container
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - "ALL"
    seccompProfile:
      type: RuntimeDefault
    readOnlyRootFilesystem: true
    runAsNonRoot: true
  # Resource limits and requests for the exporter
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi
  # Probe configurations for squid-exporter sidecar
  livenessProbe:
    httpGet:
      path: "/metrics" # Will use squidExporter.metricsPath in template
      port: metrics
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: "/metrics" # Will use squidExporter.metricsPath in template
      port: metrics
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 5

# ICAP server sidecar configuration
icapServer:
  resources:
    {}
    # requests:
    #   cpu: 10m
    #   memory: 32Mi
    # limits:
    #   cpu: 100m
    #   memory: 128Mi

# Per-site exporter configuration
perSiteExporter:
  enabled: true
  port: 9302
  metricsPath: "/metrics"

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations:
    {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
# TCP probes are used for the squid container as they are more appropriate for proxy services
livenessProbe:
  tcpSocket:
    port: http
  enabled: true

readinessProbe:
  tcpSocket:
    port: http
  enabled: true

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

# Affinity rules for pod scheduling
# By default, pod anti-affinity rules are applied to spread pods across nodes
# Uncomment the affinity section below to customize or disable these defaults
# affinity: {}

# IMPORTANT: This chart creates and manages its own namespace via templates/namespace.yaml
# DO NOT use `helm install --namespace` or `helm upgrade --namespace` with this chart
# All resources will be deployed to the namespace specified below
namespace:
  name: caching
  annotations: {}

# Cert-manager and Trust-manager installation control
# Set to true to install cert-manager and trust-manager components
installCertManagerComponents: true

# Cert-manager and Trust-manager configuration

# Cert-manager configuration
# Based on https://cert-manager.io/docs/installation/helm/
cert-manager:
  enabled: true # Set to true to enable cert-manager
  namespace: "cert-manager" # Deploy to dedicated namespace
  installCRDs: false # Install cert-manager Custom Resource Definitions
  global:
    leaderElection:
      namespace: "cert-manager" # Namespace for leader election
    podSecurityPolicy:
      enabled: false # Disable Pod Security Policy
    rbac:
      create: true # Create RBAC resources
    serviceAccount:
      create: true # Create service accounts
      name: ""
      annotations: {}
      automountServiceAccountToken: true
  replicaCount: 1
  image:
    repository: quay.io/jetstack/cert-manager-controller
    tag: v1.19.4
    pullPolicy: IfNotPresent
  webhook:
    replicaCount: 1
    image:
      repository: quay.io/jetstack/cert-manager-webhook
      tag: v1.19.4
      pullPolicy: IfNotPresent
  cainjector:
    enabled: true # Enable the CA injector component
    replicaCount: 1
    image:
      repository: quay.io/jetstack/cert-manager-cainjector
      tag: v1.19.4
      pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
  nodeSelector: {}
  tolerations: []
  affinity: {}

trust-manager:
  crds:
    enabled: false
    keep: false
  namespace: "cert-manager"

selfsigned-certificate:
  enabled: true  # Enable certificate creation - needed for SSL functionality

# Issuer configuration
# Creates a self-signed issuer and bundle in the cert-manager namespace
selfsigned-bundle:
  enabled: true  # Set to true to create a self-signed issuer and bundle

# Prometheus monitoring configuration
prometheus:
  # Enable ServiceMonitor for Prometheus Operator
  serviceMonitor:
    enabled: true
    # Namespace where the ServiceMonitor should be created
    # If empty, it will be created in the same namespace as the application
    namespace: ""
    # Additional labels for the ServiceMonitor
    labels: {}
    # Scrape interval
    interval: 30s
    # Scrape timeout
    scrapeTimeout: 10s
    # Metrics path (should match squidExporter.metricsPath)
    path: "/metrics"
    # Additional annotations for the ServiceMonitor
    annotations: {}
    # TLS options for per-site exporter scrape (9302). If enabled, Prometheus will
    # validate the HTTPS endpoint using the provided serverName and CA.
    perSiteTLS:
      enabled: true
      # Leave empty to auto-derive: <service>.<namespace>.svc.<cluster-domain>
      serverName: ""
      # If you don't have a CA handy, you can point to a Secret with ca.crt
      ca:
        secretName: "caching-tls"
        # key: "ca.crt" # optional, defaults to ca.crt
      # Alternatively, reference a mounted CA file path inside Prometheus
      # caFile: "/etc/prometheus/configmaps/proxy-ca/ca.crt"
      # As a last resort only (not recommended), you can skip verification
      insecureSkipVerify: false

# Cache configuration
cache:
  # Defines a list of URL patterns to cache. All other URLs are not cached.
  # An empty list disables this feature, meaning all URL patterns are cached.
  allowList: []
  # Size of the cache in MiB
  # Default is 1GB to effectively cache container image layers
  size: 1024
  # Maximum object size to cache in MiB
  # Should not exceed 80% of `size`
  maxObjectSize: 192
  # Cache swap low watermark (percentage)
  # Below this percentage, Squid minimizes object eviction
  swapLow: 70
  # Cache swap high watermark (percentage)
  # Above this percentage, Squid aggressively evicts objects to free up space
  swapHigh: 80

# TLS outgoing options
tlsOutgoingOptions:
  # CA file for outgoing TLS connections
  caFile: ""

# ============================================================================
# NGINX REVERSE PROXY CONFIGURATION
# ============================================================================

nginx:
  # Enable/disable the Nginx reverse proxy component
  enabled: false

  # Name used for all nginx resources (services, statefulset, configmap) and labels.
  name: "nginx"

  # Replica count for the nginx proxy StatefulSet
  replicaCount: 1

  # TLS/HTTPS configuration
  tls:
    # Enable HTTPS support
    enabled: false
    # Secret name containing `tls.crt` and `tls.key` keys
    secretName: "nginx-tls"

  # Backend server configuration
  upstream:
    # URL of the upstream server to proxy to
    url: "http://nexus.caching.svc.cluster.local:8081"

  # Authorization header injection (references existing Kubernetes secret)
  auth:
    # Enable authorization header injection
    enabled: false
    # Name of a secret containing the authorization header value
    # The secret must have a key named "authorization"
    secretName: ""

  # Cache configuration
  cache:
    # List of regex patterns for paths to cache
    # Requests matching these patterns will be cached
    # Empty list means no caching (pass-through only)
    allowList: []
    # Cache size in megabytes
    size: 1024

  # Image configuration
  image: registry.access.redhat.com/ubi10/nginx-126@sha256:9a9338207078ec51f6c58d2421c6e3f42b54277d03629467fc447d7823503920

  # Service configuration
  service:
    type: ClusterIP
    # Service port (HTTP when tls.enabled=false, HTTPS when tls.enabled=true)
    port: 80
    # Annotations to add to the service
    annotations: {}
    trafficDistribution: ""

  # Resource limits
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 128Mi

  # Container security context
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - "ALL"
    seccompProfile:
      type: RuntimeDefault
    readOnlyRootFilesystem: true
    runAsNonRoot: true

  # Affinity rules for pod scheduling
  # By default, pod anti-affinity rules are applied to spread pods across nodes
  # Uncomment the affinity section below to customize or disable these defaults
  # affinity: {}

  # Pod security context
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

# ============================================================================
# TEST-SPECIFIC CONFIGURATION
# ============================================================================

test:
  enabled: true # Enable helm test functionality
  image:
    pullPolicy: IfNotPresent
    # Note: repository and tag are set dynamically by environment helpers in _helpers.tpl
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

# mirrord configuration for development and CI testing
# The mirrord target pod provides connection stealing capabilities for local development
mirrord:
  enabled: true # Enable mirrord target pod (disable in production)
  targetPod:
    name: "mirrord-test-target" # Name of the mirrord target pod
    image:
      pullPolicy: IfNotPresent
      # Note: repository and tag are set dynamically by squid.test.image helper in _helpers.tpl
    ports:
      http: 8080 # Standard HTTP port
      testServer: 9090 # Test server port for connection stealing
    env:
      testServerPort: 9090 # TEST_SERVER_PORT environment variable
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  # NOTE: RBAC is shared with test infrastructure
  # When mirrord.enabled=true, test RBAC becomes persistent (no helm hooks)
  # When mirrord.enabled=false, test RBAC uses hooks for cleanup

# Nexus configuration (for testing)
nexus:
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
    runAsNonRoot: true
    runAsUser: 1001
